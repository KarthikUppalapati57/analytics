name: Sync Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Ensure Excel exists
        run: |
          if [ -f "CW _ CHOTO Weekly Expenditure Template 2.xlsx" ] || [ -f "CW _  CHOTO Weekly Expenditure Template 2.xlsx" ] || [ -f "source.xlsx" ]; then
            echo "Excel file found."
          else
            echo "Excel file missing in repo root."
            exit 1
          fi

      - name: Build data.json from Excel
        run: python scripts/build_data_json.py

      - name: Commit and push data.json if changed
        run: |
          if git diff --quiet -- data.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: refresh dashboard data"
          git push
